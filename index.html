<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Thai ID Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      padding: 20px 16px;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 24px 20px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #1a1a2e;
    }
    .subtitle {
      color: #666;
      margin-bottom: 18px;
      font-size: 0.9rem;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    input[type="number"] {
      flex: 1;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="number"]:focus { border-color: #3b82f6; }
    .btn-generate {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-generate:active { background: #2563eb; }
    .btn-copy {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 0.95rem;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:active { background: #16a34a; }
    .btn-copy:disabled { background: #9ca3af; cursor: default; }
    .status {
      font-size: 0.85rem;
      color: #16a34a;
      margin-bottom: 8px;
      min-height: 18px;
    }
    textarea {
      width: 100%;
      height: 260px;
      padding: 12px;
      font-size: 0.9rem;
      font-family: 'Courier New', monospace;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      color: #333;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🪪 Thai ID Generator</h1>
  <p class="subtitle">ใส่จำนวนที่ต้องการ แล้วกด Generate</p>

  <div class="input-row">
    <input type="number" id="count" value="100" min="1" max="10000" inputmode="numeric">
    <button class="btn-generate" onclick="generate()">▶ Generate</button>
  </div>

  <button class="btn-copy" id="btnCopy" onclick="copyAll()" disabled>📋 Copy ทั้งหมด</button>

  <div class="status" id="status"></div>
  <textarea id="output" placeholder="ผลลัพธ์จะแสดงที่นี่..." readonly></textarea>
</div>

<script>
  function generateOne() {
    const d1 = Math.floor(Math.random() * 8) + 1;
    let digits = [d1];
    for (let i = 0; i < 11; i++) digits.push(Math.floor(Math.random() * 10));
    let sum = 0;
    for (let i = 0; i < 12; i++) sum += digits[i] * (13 - i);
    digits.push((11 - (sum % 11)) % 10);
    return digits.join('');
  }

  function generate() {
    const count = parseInt(document.getElementById('count').value);
    if (isNaN(count) || count < 1) { alert('กรุณาใส่จำนวนที่ถูกต้อง'); return; }
    if (count > 10000) { alert('จำนวนสูงสุดคือ 10,000'); return; }
    const ids = [];
    for (let i = 0; i < count; i++) ids.push(generateOne());
    document.getElementById('output').value = ids.join('\n');
    document.getElementById('btnCopy').disabled = false;
    document.getElementById('status').textContent = `✅ สร้างแล้ว ${count.toLocaleString()} รายการ`;
  }

  function copyAll() {
    const text = document.getElementById('output').value;
    if (!text) return;
    // รองรับทั้ง mobile และ desktop
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => showCopied()).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.getElementById('output');
    ta.select();
    ta.setSelectionRange(0, 99999);
    document.execCommand('copy');
    showCopied();
  }

  function showCopied() {
    document.getElementById('status').textContent = '✅ คัดลอกแล้ว!';
    setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000);
  }

  document.getElementById('count').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
  });
</script>
</body>
</html>
